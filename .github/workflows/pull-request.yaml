name: Pull request

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false
  queue: max

permissions: {}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      agentkit: ${{ steps.filter.outputs.agentkit }}
      agentkit-cargo: ${{ steps.filter.outputs.agentkit-cargo }}
      docs: ${{ steps.filter.outputs.docs }}
      nix: ${{ steps.filter.outputs.nix }}
      workflows: ${{ steps.filter.outputs.workflows }}
      snapshot: ${{ steps.pr-body-check.outputs.matched }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Check PR body for snapshot tag
        id: pr-body-check
        uses: ./.github/actions/check-pr-body
        with:
          tag: snapshot
          body: ${{ github.event.pull_request.body }}
      - name: Detect changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            agentkit-cargo:
              - 'Cargo.toml'
              - 'Cargo.lock'
            agentkit:
              - 'crates/**'
              - 'deny.toml'
              - '.goreleaser.yaml'
            docs:
              - 'docs/**'
            nix:
              - 'nix/**'
            workflows:
              - '.github/workflows/**'

  test:
    name: Build and test
    needs: changes
    if: >
      needs.changes.outputs.agentkit == 'true' ||
      needs.changes.outputs.agentkit-cargo == 'true'
    permissions:
      actions: write  # Called workflow uses it for cargo caches
      contents: read
    uses: ./.github/workflows/agentkit.build-and-test.yaml

  docs:
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    permissions:
      contents: read
      pages: read  # To configure Pages and upload build artifact
      id-token: write  # Required by actions/configure-pages
    uses: ./.github/workflows/docs.build.yaml

  lint-workflows:
    name: Lint workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/workflows.lint.yaml

  lint-nix:
    name: Lint Nix
    needs: changes
    if: >
      needs.changes.outputs.agentkit == 'true' ||
      needs.changes.outputs.agentkit-cargo == 'true' ||
      needs.changes.outputs.nix == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/nix.lint.yaml

  update-hashes:
    name: Update cargo hashes
    needs: changes
    if: needs.changes.outputs.agentkit-cargo == 'true'
    permissions:
      actions: write  # Called workflow uses it for nix caches
      contents: write  # Called workflow pushes hash updates
    uses: ./.github/workflows/nix.update-hashes.yaml
    with:
      head-ref: ${{ github.head_ref }}
      head-sha: ${{ github.event.pull_request.head.sha }}
      pr-body: ${{ github.event.pull_request.body }}
      is-fork: ${{ github.event.pull_request.head.repo.full_name != github.repository }}

  release-snapshot:
    name: Release snapshot
    needs: changes
    if: >
      (needs.changes.outputs.agentkit == 'true' ||
       needs.changes.outputs.agentkit-cargo == 'true') &&
      needs.changes.outputs.snapshot == 'true'
    permissions:
      actions: write  # Called workflow uses it for build caches
      contents: write  # Called workflow publishes snapshot artifacts
      id-token: write  # Called workflow uses keyless signing
    uses: ./.github/workflows/agentkit.build-and-release.yaml
    with:
      build-is-snapshot: true

  ready:
    name: Ready
    needs: [test, docs, lint-workflows, lint-nix, update-hashes, release-snapshot]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check dependencies
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
