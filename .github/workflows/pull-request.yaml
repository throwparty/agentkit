name: Pull request

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false
  queue: max

permissions: {}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      agentkit: ${{ steps.filter.outputs.agentkit }}
      docs: ${{ steps.filter.outputs.docs }}
      nix: ${{ steps.filter.outputs.nix }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            agentkit:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'deny.toml'
              - '.goreleaser.yaml'
            docs:
              - 'docs/**'
            nix:
              - 'nix/**'
            workflows:
              - '.github/workflows/**'

  test:
    name: Build and test
    needs: changes
    if: needs.changes.outputs.agentkit == 'true'
    permissions:
      actions: write  # Called workflow uses it for cargo caches
      contents: read
    uses: ./.github/workflows/agentkit.build-and-test.yaml

  docs:
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    permissions:
      contents: read
      pages: read  # To configure Pages and upload build artifact
      id-token: write  # Required by actions/configure-pages
    uses: ./.github/workflows/docs.build.yaml

  lint-workflows:
    name: Lint workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/workflows.lint.yaml

  lint-nix:
    name: Lint Nix
    needs: changes
    if: needs.changes.outputs.agentkit == 'true' || needs.changes.outputs.nix == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/nix.lint.yaml

  release-snapshot:
    name: Release snapshot
    needs: changes
    if: needs.changes.outputs.agentkit == 'true'
    permissions:
      actions: write  # Called workflow uses it for build caches
      contents: write  # Called workflow publishes snapshot artifacts
      id-token: write  # Called workflow uses keyless signing
    uses: ./.github/workflows/agentkit.build-and-release.yaml
    with:
      build-is-snapshot: true

  ready:
    name: Ready
    needs: [test, docs, lint-workflows, lint-nix, release-snapshot]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
