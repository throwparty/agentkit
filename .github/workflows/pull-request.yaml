name: Pull request

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      agentkit: ${{ steps.filter.outputs.agentkit }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            agentkit:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'deny.toml'
              - '.goreleaser.yaml'
            docs:
              - 'docs/**'

  test:
    name: Build and test
    needs: changes
    if: needs.changes.outputs.agentkit == 'true'
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/agentkit.build-and-test.yaml

  docs:
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    permissions:
      contents: read
      pages: read
      id-token: write
    uses: ./.github/workflows/docs.build.yaml

  release-snapshot:
    name: Release snapshot
    needs: changes
    if: needs.changes.outputs.agentkit == 'true'
    permissions:
      actions: write
      contents: write
      id-token: write
    uses: ./.github/workflows/agentkit.build-and-release.yaml
    with:
      build-is-snapshot: true
