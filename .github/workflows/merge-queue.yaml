name: Merge queue

on:
  merge_group:
    types: [checks_requested]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.merge_group.head_ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      agentkit: ${{ steps.filter.outputs.agentkit }}
      docs: ${{ steps.filter.outputs.docs }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            agentkit:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'deny.toml'
              - '.goreleaser.yaml'
            docs:
              - 'docs/**'
            workflows:
              - '.github/workflows/**'

  test:
    name: Build and test
    needs: changes
    if: needs.changes.outputs.agentkit == 'true'
    permissions:
      actions: write  # Called workflow uses it for cargo caches
      contents: read
    uses: ./.github/workflows/agentkit.build-and-test.yaml

  docs:
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    permissions:
      contents: read
      pages: read  # To configure Pages and upload build artifact
      id-token: write  # Required by actions/configure-pages
    uses: ./.github/workflows/docs.build.yaml

  lint-workflows:
    name: Lint workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/workflows.lint.yaml

  ready:
    name: Ready
    needs: [test, docs, lint-workflows]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

