name: "Nix: update hashes"

on:
  workflow_call:
    inputs:
      head-ref:
        required: true
        type: string
      head-sha:
        required: true
        type: string
      pr-body:
        required: true
        type: string
      is-fork:
        required: true
        type: boolean

concurrency:
  group: nix-update-hashes-${{ inputs.head-ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update:
    name: Update
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # To push cargo hash updates
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    if: ${{ !inputs.is-fork }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.head-ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check and update cargo hash
        id: update-hash
        run: just nix update-hash
      - name: Commit and push
        if: >-
          steps.update-hash.outcome == 'success' &&
          !contains(inputs.pr-body, '#[no modification]')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/workflows/nix.update-hashes/commit-and-push-hash-update.sh
