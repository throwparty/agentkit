name: "Litterbox: build and release"

on:
  workflow_call:
    inputs:
      build-is-snapshot:
        type: boolean
        default: false

concurrency:
  group: agentkit-build-and-release-${{ inputs.build-is-snapshot && 'snapshot' || 'release' }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      actions: write  # To manage build caches
      contents: write  # To publish release artifacts and tags
      id-token: write  # For keyless signing with cosign
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust
        run: |
          set -eux -o pipefail
          rustup toolchain install stable
          rustup default stable
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # ratchet:sigstore/cosign-installer@v4.1.2
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # ratchet:anchore/sbom-action/download-syft@v0.24.0
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # ratchet:goto-bus-stop/setup-zig@v2.2.1
        with:
          version: 0.15.2
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@ad6ae0185bd1663c6fbd1c4efa0c82d8105a5716 # ratchet:cargo-bins/cargo-binstall@main
        with:
          version: 1.19.0
      - name: Install cargo-zigbuild
        run: cargo binstall cargo-zigbuild --version 0.21.8 --no-confirm
      - name: Cache macOS SDK
        id: cache-macos-sdk
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache/restore@v5.0.5
        with:
          path: ${{ runner.temp }}/macos-sdk
          key: macosx-sdk-26.1
      - name: Prepare macOS SDK
        env:
          SDK_URL: https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz
          SDK_CACHED: ${{ steps.cache-macos-sdk.outputs.cache-hit }}
        run: |
          set -eux -o pipefail
          SDK_DIR="${RUNNER_TEMP}/macos-sdk"
          mkdir -p "$SDK_DIR"
          if [ "$SDK_CACHED" != "true" ]; then
            curl -L "$SDK_URL" -o "$SDK_DIR/MacOSX.sdk.tar.xz"
            tar -xf "$SDK_DIR/MacOSX.sdk.tar.xz" -C "$SDK_DIR"
          fi
          SDKROOT="$(find "$SDK_DIR" -maxdepth 1 -type d -name 'MacOSX*.sdk' | head -n 1)"
          {
            printf "SDKROOT=%s\n" "$SDKROOT"
            echo "MACOSX_DEPLOYMENT_TARGET=12.0"
            echo "ZIG_SYSTEM_LIB_DIR=$SDKROOT/usr/lib"
          } >>"$GITHUB_ENV"
      - name: Save macOS SDK cache
        if: steps.cache-macos-sdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache/save@v5.0.5
        with:
          path: ${{ runner.temp }}/macos-sdk
          key: macosx-sdk-26.1
      - name: Release
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # ratchet:goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2.13.3"
          args: >
            release --clean
            ${{ inputs.build-is-snapshot && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SDKROOT: ${{ env.SDKROOT }}
          MACOSX_DEPLOYMENT_TARGET: ${{ env.MACOSX_DEPLOYMENT_TARGET }}
          ZIG_SYSTEM_LIB_DIR: ${{ env.ZIG_SYSTEM_LIB_DIR }}
      - name: Upload snapshot artifacts
        if: inputs.build-is-snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: litterbox-snapshot-${{ github.sha }}
          path: dist/
          retention-days: 30
