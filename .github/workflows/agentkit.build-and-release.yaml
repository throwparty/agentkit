name: "Litterbox: build and release"

on:
  workflow_call:
    inputs:
      build-is-snapshot:
        type: boolean
        default: false

concurrency:
  group: ${{ inputs.build-is-snapshot && format('actor-{0}', github.actor) || 'release' }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    permissions:
      actions: write  # To manage build caches
      contents: write  # To publish release artifacts and tags
      id-token: write  # For keyless signing with cosign
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache macOS SDK
        id: cache-macos-sdk
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache/restore@v6.1.0
        with:
          path: ${{ runner.temp }}/macos-sdk
          key: macosx-sdk-26.1
      - name: Prepare macOS SDK
        env:
          SDK_URL: https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz
          SDK_CACHED: ${{ steps.cache-macos-sdk.outputs.cache-hit }}
        run: .github/workflows/agentkit.build-and-release/prepare-macos-sdk.sh
      - name: Save macOS SDK cache
        if: steps.cache-macos-sdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache/save@v6.1.0
        with:
          path: ${{ runner.temp }}/macos-sdk
          key: macosx-sdk-26.1
      - name: Release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # ratchet:goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2.13.3"
          args: >
            release --clean
            ${{ inputs.build-is-snapshot && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SDKROOT: ${{ env.SDKROOT }}
          MACOSX_DEPLOYMENT_TARGET: ${{ env.MACOSX_DEPLOYMENT_TARGET }}
          ZIG_SYSTEM_LIB_DIR: ${{ env.ZIG_SYSTEM_LIB_DIR }}
      - name: Upload snapshot artifacts
        if: inputs.build-is-snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: litterbox-snapshot-${{ github.sha }}
          path: dist/
          retention-days: 30
