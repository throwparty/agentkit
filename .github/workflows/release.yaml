name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Build and release
    permissions:
      actions: write
      contents: write
      id-token: write
    uses: ./.github/workflows/agentkit.build-and-release.yaml
