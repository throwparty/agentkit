name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Build and release
    permissions:
      actions: write  # Called workflow uses it for build caches
      contents: write  # Called workflow publishes release artifacts
      id-token: write  # Called workflow uses keyless signing
    uses: ./.github/workflows/agentkit.build-and-release.yaml
