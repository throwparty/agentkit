name: "Workflows: lint"

on:
  workflow_call: {}

concurrency:
  group: workflows-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run actionlint
        run: just workflows actionlint
      - name: Run zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: just workflows zizmor
