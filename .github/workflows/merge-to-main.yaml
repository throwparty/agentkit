name: Merge to main

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      agentkit: ${{ steps.filter.outputs.agentkit }}
      agentkit-cargo: ${{ steps.filter.outputs.agentkit-cargo }}
      docs: ${{ steps.filter.outputs.docs }}
      nix: ${{ steps.filter.outputs.nix }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            agentkit-cargo:
              - 'Cargo.toml'
              - 'Cargo.lock'
            agentkit:
              - 'crates/**'
              - 'deny.toml'
              - '.goreleaser.yaml'
            docs:
              - 'docs/**'
            nix:
              - 'nix/**'
            workflows:
              - '.github/workflows/**'
              - '.github/dependabot.yaml'

  test:
    name: Build and test
    needs: changes
    if: >
      needs.changes.outputs.agentkit == 'true' ||
      needs.changes.outputs.agentkit-cargo == 'true'
    permissions:
      actions: write  # Called workflow uses it for cargo caches
      contents: read
    uses: ./.github/workflows/agentkit.build-and-test.yaml

  build-docs:
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    permissions:
      contents: read
      pages: read  # To configure Pages and upload build artifact
      id-token: write  # Required by actions/configure-pages
    uses: ./.github/workflows/docs.build.yaml

  lint-workflows:
    name: Lint workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/workflows.lint.yaml

  lint-nix:
    name: Lint Nix
    needs: changes
    if: >
      needs.changes.outputs.agentkit == 'true' ||
      needs.changes.outputs.agentkit-cargo == 'true' ||
      needs.changes.outputs.nix == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/nix.lint.yaml

  deploy-docs:
    name: Deploy docs
    needs: build-docs
    permissions:
      contents: read
      pages: write  # To deploy to GitHub Pages
      id-token: write  # Required by actions/deploy-pages
    uses: ./.github/workflows/docs.deploy.yaml
