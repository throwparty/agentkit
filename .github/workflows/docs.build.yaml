name: "Docs: build"

on:
  workflow_call: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: read
      id-token: write
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.x"
          cache: yarn
          cache-dependency-path: docs/yarn.lock
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Restore cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            docs/.docusaurus
            docs/build
          key: "${{ runner.os }}-build-and-deploy-\
            ${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-\
            ${{ hashFiles('**.css', '**.html', '**.json', '**.mdx', '**.svg', '**.tsx', '**.yml') }}"
          restore-keys: "${{ runner.os }}-build-and-deploy-\
            ${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-"
      - name: Install dependencies
        run: yarn
      - name: Build
        run: yarn build
        env:
          DOCUSAURUS_FASTER: "true"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/build
