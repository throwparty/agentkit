name: "Docs: build"

on:
  workflow_call: {}

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: read  # To configure Pages and upload build artifact
      id-token: write  # Required by actions/configure-pages
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24.x"
          cache: yarn
          cache-dependency-path: docs/yarn.lock
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # ratchet:actions/configure-pages@v6.0.0
      - name: Restore cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: |
            docs/.docusaurus
            docs/build
          key: "${{ runner.os }}-build-and-deploy-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.css', '**.html', '**.json', '**.mdx', '**.svg', '**.tsx', '**.yml') }}"
          restore-keys: "${{ runner.os }}-build-and-deploy-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-"
      - name: Install dependencies
        run: yarn
      - name: Build
        run: yarn build
        env:
          DOCUSAURUS_FASTER: "true"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # ratchet:actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/build
