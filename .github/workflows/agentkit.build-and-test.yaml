name: "Litterbox: build and test"

on:
  workflow_call: {}

concurrency:
  group: agentkit-build-and-test-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    permissions:
      actions: write  # To manage cargo caches
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Lint
        if: "!cancelled()"
        run: cargo clippy --locked --all-targets --all-features
      - name: Check
        if: "!cancelled()"
        run: cargo check --locked
      - name: Test
        if: "!cancelled()"
        run: cargo test --locked
      - name: Run audit
        if: "!cancelled()"
        run: cargo deny check
