name: "Litterbox: build and test"

on:
  workflow_call: {}

concurrency:
  group: agentkit-build-and-test-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-24.04
    permissions:
      actions: write # To manage cargo caches
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup component add clippy
      - name: Install system dependencies
        uses: ./.github/actions/litterbox-deps-ubuntu
      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # ratchet:cargo-bins/cargo-binstall@main
        with:
          version: 1.19.0
      - name: Install cargo-deny
        run: cargo-binstall cargo-deny --version 0.19.0 --no-confirm
      - name: Lint
        if: "!cancelled()"
        run: cargo clippy --locked --all-targets --all-features
      - name: Check
        if: "!cancelled()"
        run: cargo check --locked
      - name: Test
        if: "!cancelled()"
        run: cargo test --locked
      - name: Run audit
        if: "!cancelled()"
        run: cargo deny check
