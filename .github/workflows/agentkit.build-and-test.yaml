name: "Litterbox: build and test"

on:
  workflow_call: {}

concurrency:
  group: agentkit-build-and-test-${{ github.ref }}
  cancel-in-progress: true

permissions: {}
jobs:
  test:
    name: Build and test
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup component add clippy
      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@f8810ffa11196f23afb38e6fb64716fbf814ad8f # ratchet:cargo-bins/cargo-binstall@main
        with:
          version: 1.19.0
      - name: Install cargo-deny
        run: cargo-binstall cargo-deny --version 0.19.0 --no-confirm
      - name: Lint
        if: "!cancelled()"
        run: cargo clippy --locked --all-targets --all-features
      - name: Check
        if: "!cancelled()"
        run: cargo check --locked
      - name: Test
        if: "!cancelled()"
        run: cargo test --locked
      - name: Run audit
        if: "!cancelled()"
        run: cargo deny check
