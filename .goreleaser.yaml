version: 2

builds:
  - id: lens
    binary: agentkit-lens
    builder: rust
    flags:
      - --release
      - --package=agentkit-lens
    targets: &default_targets
      - x86_64-unknown-linux-gnu
      - x86_64-apple-darwin
      - x86_64-pc-windows-gnu
      - aarch64-unknown-linux-gnu
      - aarch64-apple-darwin
  - id: litterbox
    binary: agentkit-litterbox
    builder: rust
    flags:
      - --release
      - --package=agentkit-litterbox
    targets: *default_targets

archives:
  - formats: [tar.gz, zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    artifacts: checksum
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
